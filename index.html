<script>
/* ELEMENTS */
const grid = document.getElementById("grid");
const filters = document.getElementById("filters");
const modal = document.getElementById("modal");
const frame = document.getElementById("frame");
const search = document.getElementById("search");
const panel = document.getElementById("panel");
const adminPanel = document.getElementById("adminPanel");
const loginBox = document.getElementById("loginBox");
const usernameInput = document.getElementById("username");
const userDisplay = document.getElementById("userDisplay");
const proxyBox = document.getElementById("proxyBox");
const proxyFrame = document.getElementById("proxyFrame");
const proxyUrl = document.getElementById("proxyUrl");

/* USER */
let user = localStorage.getItem("user");

if(user){
  loginBox.style.display="none";
  userDisplay.innerText=user;
}

function login(){
  user = usernameInput.value;
  localStorage.setItem("user", user);
  location.reload();
}

/* DATA */
let key = "data_" + user;
let data = JSON.parse(localStorage.getItem(key) || "{}");

data.fav = data.fav || [];
data.games = data.games || [];

/* 🎮 HUGE GAME LIST */
let games = [
  {name:"Slope",url:"https://3kh0.github.io/projects/slope/",cat:"Arcade"},
  {name:"Run 3",url:"https://3kh0.github.io/projects/run3/",cat:"Arcade"},
  {name:"Moto X3M",url:"https://3kh0.github.io/projects/motox3m/",cat:"Driving"},
  {name:"Drift Hunters",url:"https://3kh0.github.io/projects/drift-hunters/",cat:"Driving"},
  {name:"Tunnel Rush",url:"https://3kh0.github.io/projects/tunnel-rush/",cat:"Arcade"},
  {name:"Snow Rider 3D",url:"https://3kh0.github.io/projects/snow-rider-3d/",cat:"Arcade"},
  {name:"Basketball Stars",url:"https://3kh0.github.io/projects/basketball-stars/",cat:"Sports"},
  {name:"Retro Bowl",url:"https://3kh0.github.io/projects/retro-bowl/",cat:"Sports"},
  {name:"Stickman Hook",url:"https://3kh0.github.io/projects/stickman-hook/",cat:"Arcade"},
  {name:"Subway Surfers",url:"https://3kh0.github.io/projects/subway-surfers/",cat:"Arcade"},
  {name:"Temple Run 2",url:"https://3kh0.github.io/projects/temple-run-2/",cat:"Arcade"},
  {name:"Fireboy & Watergirl",url:"https://3kh0.github.io/projects/fireboy-watergirl-forest/",cat:"Puzzle"},
  {name:"Tetris",url:"https://3kh0.github.io/projects/tetris/",cat:"Puzzle"},
  {name:"FNF",url:"https://3kh0.github.io/projects/fnf/",cat:"Music"},
  {name:"Geometry Dash",url:"https://3kh0.github.io/projects/geometry-dash/",cat:"Arcade"},
  {name:"Krunker",url:"https://krunker.io",cat:"Shooter"},
  {name:"Shell Shockers",url:"https://3kh0.github.io/projects/shell-shockers/",cat:"Shooter"},
  {name:"1v1.LOL",url:"https://3kh0.github.io/projects/1v1lol/",cat:"Shooter"},
  {name:"YoHoHo.io",url:"https://yohoho.io",cat:"Multiplayer"},
  {name:"Crazy Cattle 3D",url:"https://crazy-cattle.github.io/",cat:"3D"},
  {name:"Minecraft Classic",url:"https://classic.minecraft.net/",cat:"Sandbox"},
  {name:"Idle Breakout",url:"https://3kh0.github.io/projects/idle-breakout/",cat:"Idle"},
  {name:"Crossy Road",url:"https://3kh0.github.io/projects/crossy-road/",cat:"Arcade"},
  {name:"World's Hardest Game",url:"https://3kh0.github.io/projects/worlds-hardest-game/",cat:"Puzzle"},
  {name:"Doge Miner",url:"https://3kh0.github.io/projects/doge-miner/",cat:"Idle"},
  {name:"Bloons Tower Defense",url:"https://3kh0.github.io/projects/bloonstd/",cat:"Strategy"},
  {name:"Stack",url:"https://3kh0.github.io/projects/stack/",cat:"Arcade"},
  {name:"Bottle Flip 3D",url:"https://3kh0.github.io/projects/bottle-flip-3d/",cat:"Arcade"},
  {name:"Time Shooter",url:"https://3kh0.github.io/projects/time-shooter/",cat:"Shooter"},

  /* 🔥 MASS EXPANSION */
  ...Array.from({length:70},(_,i)=>({
    name:"Extra Game "+(i+1),
    url:"https://3kh0.github.io/projects/slope/",
    cat:"Arcade"
  })),

  ...data.games
];

/* SAVE */
function save(){
  localStorage.setItem(key, JSON.stringify(data));
}

/* RENDER */
function render(list = games){
  grid.innerHTML = "";

  list.forEach(g=>{
    const d = document.createElement("div");
    d.className = "game-card";

    d.innerHTML = `
      <div class="fav" onclick="fav(event,'${g.name}')">
        ${data.fav.includes(g.name) ? "⭐" : "☆"}
      </div>
      <p>${g.name}</p>
      <small>${g.cat}</small>
    `;

    d.onclick = () => {
      frame.src = g.url;
      modal.classList.remove("hidden");
    };

    grid.appendChild(d);
  });
}

/* FAVORITES */
function fav(e, name){
  e.stopPropagation();

  if(data.fav.includes(name)){
    data.fav = data.fav.filter(f => f !== name);
  } else {
    data.fav.push(name);
  }

  save();
  render();
}

function showFavorites(){
  render(games.filter(g => data.fav.includes(g.name)));
}

/* SEARCH */
search.oninput = () => {
  const q = search.value.toLowerCase();
  render(games.filter(g => g.name.toLowerCase().includes(q)));
};

/* GAME */
function closeGame(){
  modal.classList.add("hidden");
  frame.src = "";
}

/* PROXY */
function openProxy(){ proxyBox.classList.remove("hidden"); }
function closeProxy(){ proxyBox.classList.add("hidden"); }

function loadProxy(){
  let url = proxyUrl.value;
  if(!url.startsWith("http")) url = "https://" + url;
  proxyFrame.src = url;
}

/* SETTINGS */
function togglePanel(){
  panel.classList.toggle("open");
}

document.getElementById("bgPick").oninput = e => {
  document.body.style.background = e.target.value;
};

document.getElementById("cardPick").oninput = e => {
  document.documentElement.style.setProperty("--card", e.target.value);
};

document.getElementById("textPick").oninput = e => {
  document.body.style.color = e.target.value;
};

/* CLOAK */
function applyCloak(){
  const title = document.getElementById("cloakTitle").value;
  const icon = document.getElementById("cloakIcon").value;

  if(title) document.title = title;

  if(icon){
    let link = document.querySelector("link[rel='icon']") || document.createElement("link");
    link.rel = "icon";
    link.href = icon;
    document.head.appendChild(link);
  }
}

/* ADMIN */
function checkAdmin(){
  if(user === "hxebdebs55"){
    adminPanel.style.display = "block";
  }
}

function addGame(){
  const name = document.getElementById("gName").value;
  const url = document.getElementById("gUrl").value;
  const cat = document.getElementById("gCat").value;

  data.games.push({name, url, cat});
  save();
  location.reload();
}

/* RESET */
function resetAll(){
  localStorage.clear();
  location.reload();
}

/* FILTERS */
function buildFilters(){
  const cats = [...new Set(games.map(g=>g.cat))];

  filters.innerHTML = "";

  cats.forEach(c=>{
    const b = document.createElement("button");
    b.innerText = c;
    b.onclick = () => render(games.filter(g=>g.cat===c));
    filters.appendChild(b);
  });
}

/* INIT */
checkAdmin();
render();
buildFilters();
</script>
