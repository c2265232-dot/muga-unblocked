<!DOCTYPE html>
<html>
<head>
  <title>Google Classroom</title>

  <style>
    :root {
      --bg:#0f172a;
      --card:#1e293b;
      --hover:#334155;
      --text:white;
    }

    body {
      margin:0;
      font-family:Arial;
      background:var(--bg);
      color:var(--text);
    }

    header {
      display:flex;
      justify-content:space-between;
      padding:10px;
      background:#020617;
      align-items:center;
    }

    input,button {
      padding:6px;
      border:none;
      border-radius:6px;
    }

    .games-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
      gap:15px;
      padding:20px;
    }

    .game-card {
      background:var(--card);
      padding:10px;
      border-radius:12px;
      cursor:pointer;
      text-align:center;
      transition:0.2s;
      position:relative;
    }

    .game-card:hover {
      transform:scale(1.05);
      background:var(--hover);
    }

    .fav {
      position:absolute;
      right:8px;
      top:5px;
    }

    .filters {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
      padding:10px;
    }

    .modal {
      position:fixed;
      width:100%;
      height:100%;
      background:black;
      top:0;
      left:0;
      display:flex;
      flex-direction:column;
    }

    iframe {flex:1;border:none;}
    .hidden {display:none;}

    /* 🔥 SETTINGS FIX */
    .panel {
      position:fixed;
      top:0; /* FIXED */
      right:-320px;
      width:300px;
      height:100%;
      background:#020617;
      padding:15px;
      transition:0.3s;
      overflow-y:auto;
      z-index:1000;
    }

    .panel.open {right:0;}

    .login {
      position:fixed;
      top:40%;
      left:50%;
      transform:translate(-50%,-50%);
      background:#020617;
      padding:20px;
      border-radius:10px;
    }

    /* 🔥 LOADING SCREEN */
    #loader {
      position:fixed;
      width:100%;
      height:100%;
      background:black;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:30px;
      z-index:2000;
      opacity:0;
      pointer-events:none;
      transition:0.3s;
    }

    #loader.show {
      opacity:1;
      pointer-events:auto;
    }

  </style>
</head>

<body>

<div id="loader">Loading...</div>

<header>
  <input id="search" placeholder="Search...">

  <div>
    <button onclick="render()">🏠</button>
    <button onclick="showFavorites()">⭐</button>
    <button onclick="openProxy()">🌐</button>
    <button onclick="togglePanel()">⚙️</button>
    <span id="userDisplay"></span>
  </div>
</header>

<div class="filters" id="filters"></div>
<div class="games-grid" id="grid"></div>

<!-- LOGIN -->
<div id="loginBox" class="login">
  <h3>Username</h3>
  <input id="username">
  <button onclick="login()">Enter</button>
</div>

<!-- GAME -->
<div id="modal" class="modal hidden">
  <div>
    <button onclick="frame.requestFullscreen()">⛶</button>
    <button onclick="closeGame()">Exit</button>
  </div>
  <iframe id="frame"></iframe>
</div>

<!-- PROXY -->
<div id="proxyBox" class="modal hidden">
  <div>
    <input id="proxyUrl" placeholder="Search or URL">
    <button onclick="loadProxy()">Go</button>
    <button onclick="proxyFrame.requestFullscreen()">⛶</button>
    <button onclick="closeProxy()">Exit</button>
  </div>
  <iframe id="proxyFrame"></iframe>
</div>

<!-- SETTINGS -->
<div id="panel" class="panel">
  <h3>🎨 Colors</h3>
  BG <input type="color" id="bgPick"><br>
  Card <input type="color" id="cardPick"><br>
  Text <input type="color" id="textPick"><br>

  <h3>🕵️ Cloak</h3>
  Title <input id="cloakTitle"><br>
  Icon URL <input id="cloakIcon"><br>
  <button onclick="applyCloak()">Apply</button>

  <div id="adminPanel" style="display:none;">
    <h3>👑 Admin</h3>
    Name <input id="gName"><br>
    URL <input id="gUrl"><br>
    Category <input id="gCat"><br>
    <button onclick="addGame()">Add Game</button>
  </div>

  <button onclick="resetAll()">Reset</button>
</div>

<script>
const loader = document.getElementById("loader");

function showLoader(){
  loader.classList.add("show");
}
function hideLoader(){
  setTimeout(()=>loader.classList.remove("show"),500);
}

const grid=document.getElementById("grid");
const modal=document.getElementById("modal");
const frame=document.getElementById("frame");
const proxyBox=document.getElementById("proxyBox");
const proxyFrame=document.getElementById("proxyFrame");
const proxyUrl=document.getElementById("proxyUrl");
const panel=document.getElementById("panel");
const adminPanel=document.getElementById("adminPanel");

/* USER */
let user=localStorage.getItem("user");
if(user){
  document.getElementById("loginBox").style.display="none";
  document.getElementById("userDisplay").innerText=user;
}

/* GAMES */
let games=[
  {name:"Slope",url:"https://3kh0.github.io/projects/slope/"},
  {name:"Run 3",url:"https://3kh0.github.io/projects/run3/"},
  {name:"YoHoHo.io",url:"https://yohoho.io"},
  {name:"Crazy Cattle 3D",url:"https://crazy-cattle.github.io/"},
  {name:"Krunker",url:"https://krunker.io"},
  ...Array.from({length:50},(_,i)=>({
    name:"Game "+(i+1),
    url:"https://3kh0.github.io/projects/slope/"
  }))
];

/* RENDER */
function render(){
  grid.innerHTML="";
  games.forEach(g=>{
    let d=document.createElement("div");
    d.className="game-card";
    d.innerHTML=`<p>${g.name}</p>`;
    d.onclick=()=>{
      showLoader();
      frame.src=g.url;
      modal.classList.remove("hidden");
      frame.onload=hideLoader;
    };
    grid.appendChild(d);
  });
}

/* GAME */
function closeGame(){
  modal.classList.add("hidden");
  frame.src="";
}

/* PROXY */
function openProxy(){proxyBox.classList.remove("hidden");}
function closeProxy(){proxyBox.classList.add("hidden");}

function loadProxy(){
  showLoader();
  let val=proxyUrl.value;

  if(val.includes(".")){
    proxyFrame.src=val.startsWith("http")?val:"https://"+val;
  } else {
    proxyFrame.src="https://www.google.com/search?q="+encodeURIComponent(val);
  }

  proxyFrame.onload=hideLoader;
}

/* PANEL */
function togglePanel(){panel.classList.toggle("open");}

/* ADMIN */
if(user==="hxebdebs55"){
  adminPanel.style.display="block";
}

/* INIT */
render();
</script>

</body>
</html>
