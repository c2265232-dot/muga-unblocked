<!DOCTYPE html>
<html>
<head>
  <title>Google Classroom</title>

  <style>
    :root {
      --bg:#0f172a;
      --card:#1e293b;
      --hover:#334155;
      --text:white;
    }

    body {
      margin:0;
      font-family:Arial;
      background:var(--bg);
      color:var(--text);
    }

    header {
      display:flex;
      justify-content:space-between;
      padding:10px;
      background:#020617;
      align-items:center;
    }

    input, button {
      padding:6px;
      border:none;
      border-radius:6px;
    }

    .games-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
      gap:15px;
      padding:20px;
    }

    .game-card {
      background:var(--card);
      padding:10px;
      border-radius:12px;
      cursor:pointer;
      position:relative;
      text-align:center;
      transition:0.2s;
    }

    .game-card:hover {
      transform:scale(1.05);
      background:var(--hover);
    }

    .fav {
      position:absolute;
      right:8px;
      top:5px;
      cursor:pointer;
    }

    .filters {
      display:flex;
      gap:10px;
      padding:10px;
      justify-content:center;
      flex-wrap:wrap;
    }

    .modal {
      position:fixed;
      width:100%;
      height:100%;
      background:black;
      top:0;
      left:0;
      display:flex;
      flex-direction:column;
    }

    .hidden {display:none;}
    iframe {flex:1;border:none;}

    .panel {
      position:fixed;
      right:-320px;
      width:300px;
      height:100%;
      background:#020617;
      padding:15px;
      transition:0.3s;
    }

    .panel.open {right:0;}

    .login {
      position:fixed;
      top:40%;
      left:50%;
      transform:translate(-50%,-50%);
      background:#020617;
      padding:20px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<header>
  <input id="search" placeholder="Search...">

  <div>
    <button onclick="render()">🏠</button>
    <button onclick="showFavorites()">⭐</button>
    <button onclick="openProxy()">🌐</button>
    <button onclick="togglePanel()">⚙️</button>
    <span id="userDisplay"></span>
  </div>
</header>

<div class="filters" id="filters"></div>
<div class="games-grid" id="grid"></div>

<!-- LOGIN -->
<div id="loginBox" class="login">
  <h3>Username</h3>
  <input id="username">
  <button onclick="login()">Enter</button>
</div>

<!-- GAME -->
<div id="modal" class="modal hidden">
  <div>
    <button onclick="frame.requestFullscreen()">⛶</button>
    <button onclick="closeGame()">Exit</button>
  </div>
  <iframe id="frame"></iframe>
</div>

<!-- PROXY -->
<div id="proxyBox" class="modal hidden">
  <div>
    <input id="proxyUrl" placeholder="Enter URL">
    <button onclick="loadProxy()">Go</button>
    <button onclick="closeProxy()">Exit</button>
  </div>
  <iframe id="proxyFrame"></iframe>
</div>

<!-- SETTINGS -->
<div id="panel" class="panel">
  <h3>🎨 Colors</h3>
  BG <input type="color" id="bgPick"><br>
  Card <input type="color" id="cardPick"><br>
  Text <input type="color" id="textPick"><br>

  <h3>🕵️ Cloak</h3>
  Title <input id="cloakTitle"><br>
  Icon URL <input id="cloakIcon"><br>
  <button onclick="applyCloak()">Apply</button>

  <div id="adminPanel" style="display:none;">
    <h3>👑 Admin</h3>
    Name <input id="gName"><br>
    URL <input id="gUrl"><br>
    Category <input id="gCat"><br>
    <button onclick="addGame()">Add Game</button>
  </div>

  <button onclick="resetAll()">Reset</button>
</div>

<script>
const grid = document.getElementById("grid");
const filters = document.getElementById("filters");
const modal = document.getElementById("modal");
const frame = document.getElementById("frame");
const search = document.getElementById("search");
const panel = document.getElementById("panel");
const adminPanel = document.getElementById("adminPanel");
const loginBox = document.getElementById("loginBox");
const usernameInput = document.getElementById("username");
const userDisplay = document.getElementById("userDisplay");
const proxyBox = document.getElementById("proxyBox");
const proxyFrame = document.getElementById("proxyFrame");
const proxyUrl = document.getElementById("proxyUrl");

/* USER */
let user = localStorage.getItem("user");
if(user){
  loginBox.style.display="none";
  userDisplay.innerText=user;
}

function login(){
  user = usernameInput.value;
  localStorage.setItem("user", user);
  location.reload();
}

/* DATA */
let key = "data_" + user;
let data = JSON.parse(localStorage.getItem(key) || "{}");
data.fav = data.fav || [];
data.games = data.games || [];

/* GAMES */
let games = [
  {name:"Slope",url:"https://3kh0.github.io/projects/slope/",cat:"Arcade"},
  {name:"Run 3",url:"https://3kh0.github.io/projects/run3/",cat:"Arcade"},
  {name:"YoHoHo.io",url:"https://yohoho.io",cat:"Multiplayer"},
  {name:"Crazy Cattle 3D",url:"https://crazy-cattle.github.io/",cat:"3D"},
  {name:"Krunker",url:"https://krunker.io",cat:"Shooter"},
  ...Array.from({length:40},(_,i)=>({
    name:"Game "+(i+1),
    url:"https://3kh0.github.io/projects/slope/",
    cat:"Arcade"
  })),
  ...data.games
];

/* RENDER */
function render(list=games){
  grid.innerHTML="";
  list.forEach(g=>{
    let d=document.createElement("div");
    d.className="game-card";

    d.innerHTML=`
      <div class="fav" onclick="fav(event,'${g.name}')">
        ${data.fav.includes(g.name)?"⭐":"☆"}
      </div>
      <p>${g.name}</p>
    `;

    d.onclick=()=>{frame.src=g.url;modal.classList.remove("hidden");};
    grid.appendChild(d);
  });
}

/* FAVORITES */
function fav(e,n){
  e.stopPropagation();
  if(data.fav.includes(n)){
    data.fav=data.fav.filter(f=>f!=n);
  } else data.fav.push(n);
  localStorage.setItem(key,JSON.stringify(data));
  render();
}

function showFavorites(){
  render(games.filter(g=>data.fav.includes(g.name)));
}

/* SEARCH */
search.oninput=()=>{
  let q=search.value.toLowerCase();
  render(games.filter(g=>g.name.toLowerCase().includes(q)));
};

/* GAME */
function closeGame(){
  modal.classList.add("hidden");
  frame.src="";
}

/* PROXY */
function openProxy(){proxyBox.classList.remove("hidden");}
function closeProxy(){proxyBox.classList.add("hidden");}
function loadProxy(){
  let url=proxyUrl.value;
  if(!url.startsWith("http")) url="https://"+url;
  proxyFrame.src=url;
}

/* SETTINGS */
function togglePanel(){panel.classList.toggle("open");}

/* CLOAK */
function applyCloak(){
  document.title=document.getElementById("cloakTitle").value||document.title;
}

/* ADMIN */
if(user==="hxebdebs55"){
  adminPanel.style.display="block";
}

function addGame(){
  data.games.push({
    name:gName.value,
    url:gUrl.value,
    cat:gCat.value
  });
  localStorage.setItem(key,JSON.stringify(data));
  location.reload();
}

/* FILTERS */
function buildFilters(){
  let cats=[...new Set(games.map(g=>g.cat))];
  cats.forEach(c=>{
    let b=document.createElement("button");
    b.innerText=c;
    b.onclick=()=>render(games.filter(g=>g.cat==c));
    filters.appendChild(b);
  });
}

/* INIT */
render();
buildFilters();
</script>

</body>
</html>
