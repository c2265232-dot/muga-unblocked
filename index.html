<!DOCTYPE html>
<html>
<head>
  <title>Google Classroom</title>

  <style>
    :root{
      --bg:#0b1120;
      --sidebar:#020617;
      --card:#111827;
      --hover:#1f2937;
      --text:#e5e7eb;
    }

    body{
      margin:0;
      font-family:Inter, Arial;
      display:flex;
      background:var(--bg);
      color:var(--text);
    }

    /* SIDEBAR */
    .sidebar{
      width:230px;
      height:100vh;
      position:fixed;
      background:var(--sidebar);
      padding:15px;
      transition:0.3s;
    }

    .sidebar.hidden{
      transform:translateX(-100%);
    }

    .nav{
      padding:10px;
      border-radius:10px;
      cursor:pointer;
    }

    .nav:hover{
      background:var(--hover);
    }

    /* MAIN */
    .main{
      margin-left:230px;
      width:100%;
      transition:0.3s;
    }

    .main.full{margin-left:0;}

    header{
      padding:10px;
      display:flex;
      gap:10px;
      justify-content:center;
    }

    input{
      padding:10px;
      width:300px;
      border-radius:10px;
      border:none;
      background:#111827;
      color:white;
    }

    .grid{
      padding:20px;
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
      gap:20px;
    }

    .card{
      background:var(--card);
      padding:20px;
      border-radius:12px;
      cursor:pointer;
      text-align:center;
      position:relative;
    }

    .card:hover{
      background:var(--hover);
      transform:translateY(-5px);
    }

    .fav{
      position:absolute;
      top:5px;
      right:10px;
    }

    /* MODAL */
    .modal{
      position:fixed;
      inset:0;
      background:black;
      display:flex;
      flex-direction:column;
    }

    iframe{flex:1;border:none;}
    .hidden{display:none;}

    /* SETTINGS */
    .panel{
      position:fixed;
      right:-320px;
      top:0;
      width:300px;
      height:100%;
      background:#020617;
      padding:15px;
      transition:0.3s;
      overflow:auto;
    }

    .panel.open{right:0;}

    /* LOGIN */
    .login{
      position:fixed;
      top:40%;
      left:50%;
      transform:translate(-50%,-50%);
      background:#020617;
      padding:20px;
      border-radius:10px;
      z-index:999;
    }

    /* LOADER */
    #loader{
      position:fixed;
      inset:0;
      background:black;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:30px;
      opacity:0;
      pointer-events:none;
      transition:0.3s;
    }

    #loader.show{
      opacity:1;
      pointer-events:auto;
    }
  </style>
</head>

<body>

<div id="loader">Loading...</div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
  <h3>🎮 Games</h3>
  <div class="nav" onclick="setView('all')">🏠 Home</div>
  <div class="nav" onclick="setView('favorites')">⭐ Favorites</div>
  <div class="nav" onclick="setView('recent')">🕒 Recent</div>
  <div class="nav" onclick="openProxy()">🌐 Proxy</div>
  <div class="nav" onclick="togglePanel()">⚙️ Settings</div>
  <div class="nav" onclick="toggleSidebar()">⬅ Hide</div>
  <hr>
  <div id="userDisplay"></div>
</div>

<div id="main" class="main">

<header>
  <button onclick="toggleSidebar()">☰</button>
  <input id="search" placeholder="Search games...">
</header>

<div id="grid" class="grid"></div>

</div>

<!-- LOGIN -->
<div id="loginBox" class="login">
  <h3>Login</h3>
  <input id="username" placeholder="Username">
  <button onclick="login()">Enter</button>
</div>

<!-- GAME -->
<div id="modal" class="modal hidden">
  <button onclick="frame.requestFullscreen()">⛶</button>
  <button onclick="closeGame()">Exit</button>
  <iframe id="frame"></iframe>
</div>

<!-- PROXY -->
<div id="proxyBox" class="modal hidden">
  <input id="proxyUrl" placeholder="Search or URL">
  <button onclick="loadProxy()">Go</button>
  <button onclick="proxyFrame.requestFullscreen()">⛶</button>
  <button onclick="closeProxy()">Exit</button>
  <iframe id="proxyFrame"></iframe>
</div>

<!-- SETTINGS -->
<div id="panel" class="panel">
  <h3>Theme</h3>
  BG <input type="color" id="bgPick"><br><br>
  Card <input type="color" id="cardPick"><br><br>
  Text <input type="color" id="textPick"><br><br>

  <h3>Tab Cloak</h3>
  Title <input id="cloakTitle"><br>
  Icon URL <input id="cloakIcon"><br>
  <button onclick="applyCloak()">Apply</button>

  <div id="adminPanel" style="display:none;">
    <h3>Admin</h3>
    Name <input id="gName"><br>
    URL <input id="gUrl"><br>
    <button onclick="addGame()">Add Game</button>
  </div>
</div>

<script>
const grid=document.getElementById("grid");
const frame=document.getElementById("frame");
const modal=document.getElementById("modal");
const loader=document.getElementById("loader");

/* USER SYSTEM */
let users=JSON.parse(localStorage.getItem("users")||"{}");
let currentUser=localStorage.getItem("currentUser");

function login(){
  let name=username.value;
  if(!users[name]){
    users[name]={favorites:[],recent:[]};
  }
  localStorage.setItem("users",JSON.stringify(users));
  localStorage.setItem("currentUser",name);
  location.reload();
}

if(currentUser){
  loginBox.style.display="none";
  userDisplay.innerText=currentUser;
}

/* ADMIN */
if(currentUser==="hxebdebs55"){
  adminPanel.style.display="block";
}

/* SETTINGS */
let settings=JSON.parse(localStorage.getItem("settings")||"{}");

function applySettings(){
  if(settings.bg) document.body.style.background=settings.bg;
  if(settings.card) document.documentElement.style.setProperty("--card",settings.card);
  if(settings.text) document.body.style.color=settings.text;
  if(settings.title) document.title=settings.title;
}
function saveSettings(){localStorage.setItem("settings",JSON.stringify(settings));}

bgPick.oninput=e=>{settings.bg=e.target.value;applySettings();saveSettings();}
cardPick.oninput=e=>{settings.card=e.target.value;applySettings();saveSettings();}
textPick.oninput=e=>{settings.text=e.target.value;applySettings();saveSettings();}

function applyCloak(){
  settings.title=cloakTitle.value;
  settings.icon=cloakIcon.value;
  let link=document.createElement("link");
  link.rel="icon";
  link.href=settings.icon;
  document.head.appendChild(link);
  applySettings();
  saveSettings();
}

/* SIDEBAR */
function toggleSidebar(){
  sidebar.classList.toggle("hidden");
  main.classList.toggle("full");
}

/* GAMES */
let games=[
  {name:"Slope",url:"https://3kh0.github.io/projects/slope/"},
  {name:"Run 3",url:"https://3kh0.github.io/projects/run3/"},
  {name:"Krunker",url:"https://krunker.io"},
  {name:"YoHoHo.io",url:"https://yohoho.io"},
  {name:"Crazy Cattle 3D",url:"https://crazy-cattle.github.io/"},
  {name:"Drift Hunters",url:"https://3kh0.github.io/projects/drift-hunters/"},
  {name:"Moto X3M",url:"https://3kh0.github.io/projects/motox3m/"},
  {name:"Tunnel Rush",url:"https://3kh0.github.io/projects/tunnel-rush/"},
  ...JSON.parse(localStorage.getItem("customGames")||"[]")
];

/* ADMIN ADD */
function addGame(){
  let list=JSON.parse(localStorage.getItem("customGames")||"[]");
  list.push({name:gName.value,url:gUrl.value});
  localStorage.setItem("customGames",JSON.stringify(list));
  location.reload();
}

/* VIEW */
let view="all";

function setView(v){
  view=v;
  render();
}

/* FAVORITES + RECENT */
function toggleFav(e,name){
  e.stopPropagation();
  let u=users[currentUser];
  if(u.favorites.includes(name)){
    u.favorites=u.favorites.filter(f=>f!==name);
  } else u.favorites.push(name);
  saveUsers();
  render();
}

function saveUsers(){
  localStorage.setItem("users",JSON.stringify(users));
}

/* LOADER */
function showLoader(){loader.classList.add("show");}
function hideLoader(){setTimeout(()=>loader.classList.remove("show"),300);}

/* RENDER */
function render(){
  grid.innerHTML="";
  let list=games;

  let u=users[currentUser]||{favorites:[],recent:[]};

  if(view==="favorites") list=games.filter(g=>u.favorites.includes(g.name));
  if(view==="recent") list=games.filter(g=>u.recent.includes(g.name));

  let q=search.value?.toLowerCase()||"";
  list=list.filter(g=>g.name.toLowerCase().includes(q));

  list.forEach(g=>{
    let d=document.createElement("div");
    d.className="card";

    d.innerHTML=`
      <div class="fav" onclick="toggleFav(event,'${g.name}')">
        ${u.favorites.includes(g.name)?"⭐":"☆"}
      </div>
      <p>${g.name}</p>
    `;

    d.onclick=()=>{
      showLoader();
      frame.src=g.url;
      modal.classList.remove("hidden");

      if(!u.recent.includes(g.name)){
        u.recent.unshift(g.name);
        u.recent=u.recent.slice(0,10);
        saveUsers();
      }

      frame.onload=hideLoader;
    };

    grid.appendChild(d);
  });
}

search.oninput=render;

function closeGame(){
  modal.classList.add("hidden");
  frame.src="";
}

/* PROXY */
function openProxy(){proxyBox.classList.remove("hidden");}
function closeProxy(){proxyBox.classList.add("hidden");}

function loadProxy(){
  showLoader();
  let v=proxyUrl.value;
  proxyFrame.src=v.includes(".")?v:"https://www.google.com/search?q="+v;
  proxyFrame.onload=hideLoader;
}

/* PANEL */
function togglePanel(){
  panel.classList.toggle("open");
}

/* INIT */
applySettings();
render();
</script>

</body>
</html>
