<!DOCTYPE html>
<html>
<head>
  <title>Unblocked Games</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    h1 {
      text-align: center;
      padding: 15px;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .game-card {
      background: #1e293b;
      border-radius: 12px;
      padding: 10px;
      cursor: pointer;
      transition: 0.2s;
      text-align: center;
    }

    .game-card:hover {
      transform: scale(1.05);
      background: #334155;
    }

    .game-card img {
      width: 100%;
      border-radius: 10px;
    }

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      display: flex;
      flex-direction: column;
    }

    .hidden {
      display: none;
    }

    .modal iframe {
      flex: 1;
      border: none;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      background: #020617;
    }

    .top-bar button {
      background: red;
      border: none;
      color: white;
      padding: 8px 12px;
      cursor: pointer;
      border-radius: 6px;
    }
  </style>
</head>

<body>

  <h1>🎮 Unblocked Games</h1>

  <div class="games-grid" id="gamesGrid"></div>

  <!-- FULLSCREEN GAME -->
  <div id="gameModal" class="modal hidden">
    <div class="top-bar">
      <span id="gameTitle">Game</span>
      <button onclick="closeGame()">Exit</button>
    </div>
    <iframe id="gameFrame"></iframe>
  </div>

  <script>
    const games = [
      {name: "Slope", url: "https://3kh0.github.io/projects/slope/", img: "https://via.placeholder.com/150"},
      {name: "Run 3", url: "https://3kh0.github.io/projects/run3/", img: "https://via.placeholder.com/150"},
      {name: "Moto X3M", url: "https://3kh0.github.io/projects/motox3m/", img: "https://via.placeholder.com/150"},
      {name: "Minecraft Classic", url: "https://classic.minecraft.net/", img: "https://via.placeholder.com/150"},
      {name: "Tetris", url: "https://3kh0.github.io/projects/tetris/", img: "https://via.placeholder.com/150"},
      {name: "Drift Hunters", url: "https://3kh0.github.io/projects/drift-hunters/", img: "https://via.placeholder.com/150"},
      {name: "Basketball Stars", url: "https://3kh0.github.io/projects/basketball-stars/", img: "https://via.placeholder.com/150"},
      {name: "Tunnel Rush", url: "https://3kh0.github.io/projects/tunnel-rush/", img: "https://via.placeholder.com/150"},
      {name: "Retro Bowl", url: "https://3kh0.github.io/projects/retro-bowl/", img: "https://via.placeholder.com/150"},
      {name: "Snow Rider 3D", url: "https://3kh0.github.io/projects/snow-rider-3d/", img: "https://via.placeholder.com/150"},

      // quick way to add more
      ...Array.from({length: 20}, (_, i) => ({
        name: "Extra Game " + (i+1),
        url: "https://3kh0.github.io/projects/slope/",
        img: "https://via.placeholder.com/150"
      }))
    ];

    const grid = document.getElementById("gamesGrid");

    games.forEach(game => {
      const card = document.createElement("div");
      card.className = "game-card";

      card.innerHTML = `
        <img src="${game.img}">
        <p>${game.name}</p>
      `;

      card.onclick = () => openGame(game);
      grid.appendChild(card);
    });

    function openGame(game) {
      document.getElementById("gameFrame").src = game.url;
      document.getElementById("gameTitle").innerText = game.name;
      document.getElementById("gameModal").classList.remove("hidden");
    }

    function closeGame() {
      document.getElementById("gameModal").classList.add("hidden");
      document.getElementById("gameFrame").src = "";
    }
  </script>

</body>
</html>
