<!DOCTYPE html>
<html>
<head>
  <title>Google Classroom</title>

  <style>
    :root{
      --bg:#0b1120;
      --sidebar:#020617;
      --card:#111827;
      --hover:#1f2937;
      --text:#e5e7eb;
      --accent:#3b82f6;
    }

    body{
      margin:0;
      font-family:Inter, Arial;
      display:flex;
      background:var(--bg);
      color:var(--text);
    }

    /* SIDEBAR */
    .sidebar{
      width:220px;
      background:var(--sidebar);
      padding:15px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .logo{
      font-size:20px;
      font-weight:bold;
      margin-bottom:10px;
    }

    .nav-btn{
      padding:10px;
      border-radius:10px;
      cursor:pointer;
    }

    .nav-btn:hover{
      background:var(--hover);
    }

    /* MAIN */
    .main{
      flex:1;
      display:flex;
      flex-direction:column;
    }

    header{
      padding:15px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
      border-bottom:1px solid #1f2937;
    }

    input{
      width:350px;
      padding:10px;
      border-radius:10px;
      border:none;
      background:#111827;
      color:white;
    }

    .tabs{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .tab{
      padding:6px 12px;
      border-radius:999px;
      background:var(--card);
      cursor:pointer;
      font-size:14px;
    }

    .tab.active{
      background:var(--accent);
    }

    .grid{
      padding:20px;
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
      gap:20px;
    }

    .card{
      background:var(--card);
      border-radius:16px;
      padding:20px;
      text-align:center;
      cursor:pointer;
      position:relative;
      transition:0.2s;
    }

    .card:hover{
      transform:translateY(-6px);
      background:var(--hover);
      box-shadow:0 10px 25px rgba(0,0,0,0.4);
    }

    .fav{
      position:absolute;
      top:8px;
      right:10px;
      cursor:pointer;
    }

    /* MODAL */
    .modal{
      position:fixed;
      inset:0;
      background:black;
      display:flex;
      flex-direction:column;
    }

    iframe{flex:1;border:none;}
    .hidden{display:none;}

    /* SETTINGS */
    .panel{
      position:fixed;
      right:-320px;
      top:0;
      width:300px;
      height:100%;
      background:#020617;
      padding:15px;
      transition:0.3s;
    }

    .panel.open{right:0;}

    /* LOADER */
    #loader{
      position:fixed;
      inset:0;
      background:black;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:30px;
      opacity:0;
      pointer-events:none;
      transition:0.3s;
    }

    #loader.show{
      opacity:1;
      pointer-events:auto;
    }
  </style>
</head>

<body>

<div id="loader">Loading...</div>

<div class="sidebar">
  <div class="logo">🎮 Games</div>
  <div class="nav-btn" onclick="setTab('all')">🏠 Home</div>
  <div class="nav-btn" onclick="setTab('favorites')">⭐ Favorites</div>
  <div class="nav-btn" onclick="setTab('recent')">🕒 Recent</div>
  <div class="nav-btn" onclick="openProxy()">🌐 Proxy</div>
  <div class="nav-btn" onclick="togglePanel()">⚙️ Settings</div>
</div>

<div class="main">

<header>
  <input id="search" placeholder="Search games...">
  <div class="tabs" id="tabs"></div>
</header>

<div id="grid" class="grid"></div>

</div>

<!-- GAME -->
<div id="modal" class="modal hidden">
  <div>
    <button onclick="frame.requestFullscreen()">⛶</button>
    <button onclick="closeGame()">Exit</button>
  </div>
  <iframe id="frame"></iframe>
</div>

<!-- PROXY -->
<div id="proxyBox" class="modal hidden">
  <div>
    <input id="proxyUrl" placeholder="Search or URL">
    <button onclick="loadProxy()">Go</button>
    <button onclick="proxyFrame.requestFullscreen()">⛶</button>
    <button onclick="closeProxy()">Exit</button>
  </div>
  <iframe id="proxyFrame"></iframe>
</div>

<!-- SETTINGS -->
<div id="panel" class="panel">
  <h3>Theme</h3>
  BG <input type="color" id="bgPick"><br><br>
  Card <input type="color" id="cardPick"><br><br>
  Text <input type="color" id="textPick"><br><br>
</div>

<script>
const grid = document.getElementById("grid");
const tabs = document.getElementById("tabs");
const frame = document.getElementById("frame");
const modal = document.getElementById("modal");
const proxyBox = document.getElementById("proxyBox");
const proxyFrame = document.getElementById("proxyFrame");
const proxyUrl = document.getElementById("proxyUrl");
const loader = document.getElementById("loader");

/* STATE */
let currentTab="all";
let favorites=JSON.parse(localStorage.getItem("fav")||"[]");
let recent=JSON.parse(localStorage.getItem("recent")||"[]");
let settings=JSON.parse(localStorage.getItem("settings")||"{}");

/* SETTINGS */
function applySettings(){
  if(settings.bg) document.body.style.background=settings.bg;
  if(settings.card) document.documentElement.style.setProperty("--card",settings.card);
  if(settings.text) document.body.style.color=settings.text;
}
function saveSettings(){localStorage.setItem("settings",JSON.stringify(settings));}

bgPick.oninput=e=>{settings.bg=e.target.value;applySettings();saveSettings();}
cardPick.oninput=e=>{settings.card=e.target.value;applySettings();saveSettings();}
textPick.oninput=e=>{settings.text=e.target.value;applySettings();saveSettings();}

/* LOADER */
function showLoader(){loader.classList.add("show");}
function hideLoader(){setTimeout(()=>loader.classList.remove("show"),300);}

/* GAMES */
let games=[
  {name:"Slope",cat:"Arcade",url:"https://3kh0.github.io/projects/slope/"},
  {name:"Run 3",cat:"Arcade",url:"https://3kh0.github.io/projects/run3/"},
  {name:"Krunker",cat:"Shooter",url:"https://krunker.io"},
  {name:"YoHoHo.io",cat:"Multiplayer",url:"https://yohoho.io"},
  {name:"Crazy Cattle 3D",cat:"3D",url:"https://crazy-cattle.github.io/"},
  {name:"Drift Hunters",cat:"Driving",url:"https://3kh0.github.io/projects/drift-hunters/"},
  {name:"Moto X3M",cat:"Driving",url:"https://3kh0.github.io/projects/motox3m/"},
  {name:"Tunnel Rush",cat:"Arcade",url:"https://3kh0.github.io/projects/tunnel-rush/"}
];

/* TABS */
function buildTabs(){
  let cats=["all","favorites","recent",...new Set(games.map(g=>g.cat))];
  tabs.innerHTML="";
  cats.forEach(c=>{
    let t=document.createElement("div");
    t.className="tab"+(c===currentTab?" active":"");
    t.innerText=c;
    t.onclick=()=>setTab(c);
    tabs.appendChild(t);
  });
}

function setTab(t){
  currentTab=t;
  buildTabs();
  render();
}

/* FAVORITES */
function toggleFav(e,name){
  e.stopPropagation();
  if(favorites.includes(name)){
    favorites=favorites.filter(f=>f!==name);
  } else favorites.push(name);
  localStorage.setItem("fav",JSON.stringify(favorites));
  render();
}

/* RENDER */
function render(){
  grid.innerHTML="";
  let list=games;

  if(currentTab==="favorites") list=games.filter(g=>favorites.includes(g.name));
  else if(currentTab==="recent") list=games.filter(g=>recent.includes(g.name));
  else if(currentTab!=="all") list=games.filter(g=>g.cat===currentTab);

  let q=search.value?.toLowerCase()||"";
  list=list.filter(g=>g.name.toLowerCase().includes(q));

  list.forEach(g=>{
    let d=document.createElement("div");
    d.className="card";

    d.innerHTML=`
      <div class="fav" onclick="toggleFav(event,'${g.name}')">
        ${favorites.includes(g.name)?"⭐":"☆"}
      </div>
      <p>${g.name}</p>
    `;

    d.onclick=()=>{
      showLoader();
      frame.src=g.url;
      modal.classList.remove("hidden");

      if(!recent.includes(g.name)){
        recent.unshift(g.name);
        recent=recent.slice(0,10);
        localStorage.setItem("recent",JSON.stringify(recent));
      }

      frame.onload=hideLoader;
    };

    grid.appendChild(d);
  });
}

/* SEARCH */
search.oninput=render;

/* GAME */
function closeGame(){
  modal.classList.add("hidden");
  frame.src="";
}

/* PROXY */
function openProxy(){proxyBox.classList.remove("hidden");}
function closeProxy(){proxyBox.classList.add("hidden");}

function loadProxy(){
  showLoader();
  let v=proxyUrl.value;
  proxyFrame.src=v.includes(".")?v:"https://www.google.com/search?q="+v;
  proxyFrame.onload=hideLoader;
}

/* SETTINGS PANEL */
function togglePanel(){
  document.getElementById("panel").classList.toggle("open");
}

/* INIT */
applySettings();
buildTabs();
render();
</script>

</body>
</html>
