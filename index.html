<!DOCTYPE html>
<html>
<head>
  <title>Google Classroom</title>

  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --hover: #334155;
      --text: white;
    }

    body {
      margin: 0;
      font-family: Arial;
      background: var(--bg);
      color: var(--text);
      transition: 0.3s;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      background: #020617;
      align-items: center;
    }

    input, select {
      padding: 6px;
      border-radius: 6px;
      border: none;
    }

    button {
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .game-card {
      background: var(--card);
      border-radius: 12px;
      padding: 10px;
      cursor: pointer;
      text-align: center;
      transition: 0.2s;
      position: relative;
    }

    .game-card:hover {
      transform: scale(1.07);
      background: var(--hover);
    }

    .fav {
      position: absolute;
      right: 8px;
      top: 5px;
      cursor: pointer;
    }

    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 10px;
    }

    .modal {
      position: fixed;
      width: 100%;
      height: 100%;
      background: black;
      top: 0;
      left: 0;
      display: flex;
      flex-direction: column;
    }

    .hidden { display:none; }

    iframe {
      flex:1;
      border:none;
    }

    .panel {
      position: fixed;
      right: -320px;
      width: 300px;
      height: 100%;
      background: #020617;
      transition: 0.3s;
      padding: 15px;
    }

    .panel.open { right:0; }

    .login {
      position: fixed;
      top: 40%;
      left: 50%;
      transform: translate(-50%,-50%);
      background: #020617;
      padding: 20px;
      border-radius: 10px;
    }

  </style>
</head>

<body>

<header>
  <input id="search" placeholder="Search...">

  <div>
    <span id="userDisplay"></span>
    <button onclick="showFavorites()">⭐</button>
    <button onclick="togglePanel()">⚙️</button>
  </div>
</header>

<div class="filters" id="filters"></div>
<div class="games-grid" id="grid"></div>

<!-- LOGIN -->
<div id="loginBox" class="login">
  <h3>Enter Username</h3>
  <input id="username">
  <button onclick="login()">Enter</button>
</div>

<!-- GAME -->
<div id="modal" class="modal hidden">
  <div>
    <button onclick="frame.requestFullscreen()">⛶</button>
    <button onclick="closeGame()">Exit</button>
  </div>
  <iframe id="frame"></iframe>
</div>

<!-- SETTINGS -->
<div id="panel" class="panel">
  <h3>Colors</h3>
  BG <input type="color" id="bgPick"><br>
  Card <input type="color" id="cardPick"><br>
  Text <input type="color" id="textPick"><br>

  <h3>Cloak</h3>
  <select id="cloak">
    <option value="none">None</option>
    <option value="google">Google</option>
    <option value="classroom">Classroom</option>
  </select>
  <button onclick="applyCloak()">Apply</button>

  <button onclick="resetAll()">Reset</button>
</div>

<script>
let user = localStorage.getItem("user");
if(user){
  loginBox.style.display="none";
  userDisplay.innerText=user;
}

function login(){
  user=username.value;
  localStorage.setItem("user",user);
  location.reload();
}

let key = "data_"+user;
let data = JSON.parse(localStorage.getItem(key)||"{}");

let games = [
  {name:"Slope",url:"https://3kh0.github.io/projects/slope/",cat:"Arcade"},
  {name:"Run 3",url:"https://3kh0.github.io/projects/run3/",cat:"Arcade"},
  {name:"YoHoHo.io",url:"https://yohoho.io",cat:"Multiplayer"},
  {name:"Crazy Cattle 3D",url:"https://github.com/search?q=crazy+cattle+3d&type=repositories",cat:"3D"},
  {name:"Krunker",url:"https://krunker.io",cat:"Shooter"},
  {name:"Shell Shockers",url:"https://3kh0.github.io/projects/shell-shockers/",cat:"Shooter"},

  ...Array.from({length:50},(_,i)=>({
    name:"Game "+(i+1),
    url:"https://3kh0.github.io/projects/slope/",
    cat:"Arcade"
  }))
];

data.fav = data.fav || [];

function save(){
  localStorage.setItem(key,JSON.stringify(data));
}

function render(list=games){
  grid.innerHTML="";
  list.forEach(g=>{
    let d=document.createElement("div");
    d.className="game-card";

    d.innerHTML=`
      <div class="fav" onclick="fav(event,'${g.name}')">
        ${data.fav.includes(g.name)?"⭐":"☆"}
      </div>
      <p>${g.name}</p>
    `;

    d.onclick=()=>{frame.src=g.url;modal.classList.remove("hidden");};
    grid.appendChild(d);
  });
}

function fav(e,n){
  e.stopPropagation();
  if(data.fav.includes(n)){
    data.fav=data.fav.filter(f=>f!=n);
  } else data.fav.push(n);
  save();
  render();
}

function showFavorites(){
  render(games.filter(g=>data.fav.includes(g.name)));
}

search.oninput=()=>{
  let q=search.value.toLowerCase();
  render(games.filter(g=>g.name.toLowerCase().includes(q)));
};

function closeGame(){
  modal.classList.add("hidden");
  frame.src="";
}

function togglePanel(){
  panel.classList.toggle("open");
}

bgPick.oninput=()=>{document.body.style.background=bgPick.value;}
cardPick.oninput=()=>{document.documentElement.style.setProperty("--card",cardPick.value);}
textPick.oninput=()=>{document.body.style.color=textPick.value;}

function applyCloak(){
  if(cloak.value=="google") document.title="Google";
  if(cloak.value=="classroom") document.title="Google Classroom";
}

function resetAll(){
  localStorage.clear();
  location.reload();
}

function buildFilters(){
  let cats=[...new Set(games.map(g=>g.cat))];
  cats.forEach(c=>{
    let b=document.createElement("button");
    b.innerText=c;
    b.onclick=()=>render(games.filter(g=>g.cat==c));
    filters.appendChild(b);
  });
}

render();
buildFilters();
</script>

</body>
</html>
